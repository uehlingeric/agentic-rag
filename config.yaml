# Runtime configuration. Environment variables (AGENTIC_RAG_*) override these
# values; API keys live in .env, never here.
provider: ollama

anthropic:
  model: claude-sonnet-5
  # backend: bedrock  # route via AWS Bedrock; auth = AWS credential chain, no key in .env
  # bedrock_model: us.anthropic.claude-...  # Bedrock model IDs differ from API ones
  # aws_region: us-east-1
openai:
  model: gpt-5.4
google:
  model: gemini-3.5-flash
  # backend: vertex  # route via Vertex AI; auth = Application Default Credentials
  # vertex_project: my-gcp-project
  # vertex_location: global  # current Gemini models 404 on regional endpoints
ollama:
  model: llama3.1:8b
  host: http://localhost:11434

embedding:
  provider: ollama
  model: nomic-embed-text

chunking:
  target_tokens: 512
  overlap_tokens: 64

# guardrails:                    # on by default; guardrails.yaml is the reference policy
#   enabled: false               # escape hatch; CLI --no-guardrails does this per-call
#   policy_file: guardrails.yaml # override the built-in conservative policy
#   ner: true                    # spaCy NER layer ([guardrails-ner] extra + en_core_web_sm)
#   log_raw_query: true          # audit raw queries, not just their SHA-256

# observability:                 # off by default; enable to emit OpenTelemetry traces
#   enabled: true
#   exporter: otlp               # console (stderr) or otlp (Jaeger/OTLP collector)
#   otlp_endpoint: http://localhost:4318  # OTLP/HTTP endpoint for traces
#   sample_ratio: 1.0            # head sampling (0.0 = no traces, 1.0 = all traces)
#   service_name: agentic-rag    # tags all traces; defaults to agentic-rag

# metrics:                        # on by default; per-request SQLite ledger
#   enabled: true                # turn off to disable all metrics recording
#   db_path: data/metrics.db     # defaults to {data_dir}/metrics.db

data_dir: data
